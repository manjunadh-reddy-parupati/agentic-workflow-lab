# nginx serves the built React app and proxies /api to the backend container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large document uploads (default nginx cap is only 1 MB).
    client_max_body_size 50m;

    # Forward API calls to the backend service (same Docker network).
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Document validation can take a while — allow long-running requests.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Stream Server-Sent Events (live progress) without buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
    }

    # SPA fallback: let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
